<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto-start-reverse" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="360" fill="#ffffff"/>

  <!-- self-hosted boundary -->
  <rect x="250" y="24" width="250" height="266" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="266" y="44" font-size="12" font-weight="600" fill="#64748b">self-hosted</text>

  <!-- edges (drawn first, under the nodes) -->
  <!-- telegram -> bot -->
  <line x1="180" y1="232" x2="298" y2="232" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <text x="239" y="224" text-anchor="middle" font-size="11" fill="#64748b">link</text>
  <!-- translation-server <-> bot -->
  <line x1="378" y1="106" x2="378" y2="188" stroke="#94a3b8" stroke-width="2" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="388" y="152" font-size="11" fill="#64748b">URL → item + PDF</text>
  <!-- bot -> zotero -->
  <line x1="456" y1="212" x2="558" y2="152" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <text x="512" y="176" text-anchor="middle" font-size="11" fill="#64748b">add · dedup</text>
  <!-- bot <-> pdf sources -->
  <line x1="456" y1="232" x2="558" y2="232" stroke="#94a3b8" stroke-width="2" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="507" y="224" text-anchor="middle" font-size="11" fill="#64748b">fetch PDF</text>
  <!-- bot -> drive -->
  <line x1="456" y1="252" x2="558" y2="308" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <text x="500" y="298" text-anchor="middle" font-size="11" fill="#64748b">rclone</text>
  <!-- drive -> ipad -->
  <line x1="746" y1="313" x2="773" y2="313" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <text x="759" y="305" text-anchor="middle" font-size="11" fill="#64748b">sync</text>

  <!-- nodes -->
  <!-- telegram -->
  <rect x="40" y="204" width="140" height="56" rx="10" fill="#e3f2fd" stroke="#2aabee" stroke-width="1.5"/>
  <text x="110" y="228" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">✈️ Telegram</text>
  <text x="110" y="246" text-anchor="middle" font-size="11" fill="#64748b">you send a link</text>

  <!-- translation-server -->
  <rect x="283" y="52" width="190" height="54" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="378" y="76" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0f172a">🐳 translation-server</text>
  <text x="378" y="94" text-anchor="middle" font-size="11" fill="#64748b">Docker</text>

  <!-- bot.py (core) -->
  <rect x="300" y="190" width="156" height="80" rx="12" fill="#0f172a"/>
  <text x="378" y="222" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">🤖 bot.py</text>
  <text x="378" y="243" text-anchor="middle" font-size="11.5" fill="#cbd5e1">orchestrator</text>

  <!-- zotero -->
  <rect x="560" y="120" width="185" height="54" rx="10" fill="#fde8e8" stroke="#cc2936" stroke-width="1.5"/>
  <text x="652" y="144" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0f172a">📚 Zotero Web API</text>
  <text x="652" y="162" text-anchor="middle" font-size="11" fill="#64748b">tag + collection</text>

  <!-- pdf sources -->
  <rect x="560" y="203" width="185" height="54" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="652" y="227" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0f172a">📄 arXiv · Unpaywall</text>
  <text x="652" y="245" text-anchor="middle" font-size="11" fill="#64748b">PDF sources</text>

  <!-- google drive -->
  <rect x="560" y="286" width="185" height="54" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="652" y="310" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0f172a">☁️ Google Drive</text>
  <text x="652" y="328" text-anchor="middle" font-size="11" fill="#64748b">gdrive:Papers/</text>

  <!-- ipad -->
  <rect x="775" y="286" width="95" height="54" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
  <text x="822" y="310" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0f172a">📱 iPad</text>
  <text x="822" y="328" text-anchor="middle" font-size="11" fill="#64748b">reader</text>
</svg>
